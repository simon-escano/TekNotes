{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{% endblock %} | TekNotes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans h-full" style="font-family: 'Poppins', sans-serif;">
    <div class="flex flex-col h-full">
        <header class="flex items-center w-full p-3 shadow-lg z-10 bg-gray-50">
            <div class="flex flex-1 items-center gap-4">
                <img src="{% static 'core/icons/Menu.svg' %}" alt="Menu">
                <a href="/" class="flex items-center gap-2">
                    <img src="{% static 'core/icons/TekNotes-Logo.svg' %}" alt="Logo">
                    <p class="font-semibold text-rose-800 text-4xl">TekNotes</p>
                </a>
                <form action="{% url 'core:search' %}" method="get" class="flex flex-1 max-w-[600px] px-4 py-2 rounded-xl bg-gray-200 gap-3 cursor-text" onclick="this.querySelector('input[name=\'query\']').focus();">
                    <img src="{% static 'core/icons/Search.svg' %}" alt="Search">
                    <input name="query" class="placeholder-gray-500 text-gray-700 bg-transparent border-none focus:outline-none" type="text" value="{{ query }}" placeholder="Search">
                </form>
            </div>

            <div class="flex items-center gap-4">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'note:new_note' %}" class="flex bg-rose-800 rounded-xl gap-4 px-4 py-2">
                        <img src="{% static 'core/icons/Edit.svg' %}" alt="Edit">
                        <p class="text-gray-50 font-medium text-lg">Tek a Note</p>
                    </a>
                    <a href="{% url 'core:logout' %}" class="flex rounded-xl gap-4 px-4 py-2 bg-gray-200">
                        <p class="text-gray-700 text-lg">Log out</p>
                    </a>
                {% else %}
                    <a href="/login/" class="flex bg-rose-800 rounded-xl gap-4 px-6 py-2">
                        <p class="text-gray-50 font-medium text-lg">Sign In</p>
                    </a>
                {% endif %}
            </div>
        </header>
        <main class="flex bg-gray-200 h-full overflow-hidden">
            <nav class="flex flex-col w-full max-w-72 h-full p-3 gap-3">
                <a href="/" class="flex rounded-xl px-4 py-3 gap-4 {% if request.path == '/' %} bg-gray-50 px-6 py-3 shadow-lg border-l-8 border-rose-800 {% endif %}">
                    <img src="{% static 'core/icons/Home.svg' %}" alt="Home">
                    <p class="text-lg text-gray-700 font-medium">Home</p>
                </a>
                <a href="{% if request.user %}/your_notes/{% else %}/login/{% endif %}" class="flex rounded-xl px-4 py-3 gap-4 {% if request.path == '/your_notes/' %} bg-gray-50 px-6 py-3 shadow-lg border-l-8 border-rose-800 {% endif %}">
                    <img src="{% static 'core/icons/User.svg' %}" alt="User">
                    <p class="text-lg text-gray-700 font-medium">Your Notes</p>
                </a>
                <a href="{% if request.user %}/likes/{% else %}/login/{% endif %}" class="flex rounded-xl px-4 py-3 gap-4 {% if request.path == '/likes/' %} bg-gray-50 px-6 py-3 shadow-lg border-l-8 border-rose-800 {% endif %}">
                    <img src="{% static 'core/icons/Likes.svg' %}" alt="Likes">
                    <p class="text-lg text-gray-700 font-medium">Likes</p>
                </a>
            </nav>

            <div class="flex flex-col flex-1 h-full p-3 gap-3 overflow-hidden">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
