{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Log In | TekNotes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex font-sans h-full bg-gray-200 items-center justify-center" style="font-family: 'Poppins', sans-serif;">
    <div class="flex flex-col max-w-[450px] w-full rounded-xl overflow-hidden bg-gray-50">
        <div class="h-9 bg-rose-800 w-full"></div>

        <div class="flex flex-col p-6 gap-3 items-center justify-center">
            <div class="flex flex-col items-center justify-center">
                <p class="text-gray-700 font-semibold text-2xl">Sign in to</p>
                <div class="flex items-center gap-2">
                    <img src="{% static 'core/icons/TekNotes-Logo.svg' %}" alt="Logo">
                    <p class="font-semibold text-rose-800 text-4xl">TekNotes</p>
                </div>
            </div>

            <form action="." method="post" class="flex flex-col w-full gap-3">
                {% csrf_token %}

                <div class="flex gap-3 px-4 py-3 border-2 border-yellow-500 rounded-xl">
                    <img src="{% static 'core/icons/user_yellow.svg' %}" alt="User">
                    {{ form.username }}
                </div>

                <div class="flex gap-3 px-4 py-3 border-2 border-yellow-500 rounded-xl">
                    <img src="{% static 'core/icons/Password.svg' %}" alt="Lock">
                    {{ form.password }}
                </div>

                {% if form.errors or form.non_field_errors %}
                    <div class="mb-3 p-6 bg-red-100 rounded-xl">
                        {% for field in form %}
                            {{ field.errors }}
                        {% endfor %}
        
                        {{ form.non_field_errors }}
                    </div>
                {% endif %}
                    
                <button class="px-4 py-2 text-gray-50 bg-rose-800 font-medium rounded-md">Log in</button>
            </form>

            <p class="text-sm text-gray-700">Don't have an account? <a href="/signup/" class="underline text-rose-800 font-semibold">Sign up!</a></p>
        </div>
    </div>
</body>
</html>
