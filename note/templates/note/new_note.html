{% extends 'core/base.html' %}

{% load static %}

{% block title %} New note {% endblock %}

{% block content %}
    <div class="flex flex-col max-w-[450px] w-full rounded-xl bg-gray-50 self-center shadow-lg">
        <div class="flex px-4 py-2 bg-rose-800 w-full justify-between items-center rounded-t-xl">
            <p class="font-semibold text-gray-50 text-lg">Tek a note</p>
            <a href="/"><img src="{% static 'core/icons/Close.svg' %}" alt="x"></a>
        </div>

        <div class="flex flex-col items-center justify-center">
            <form action="." method="post" class="flex flex-col w-full">
                {% csrf_token %}

                <div class="flex flex-col p-6 gap-3">
                    <div class="flex gap-3 px-4 py-3 border-2 border-yellow-500 rounded-xl">
                        {{ form.course }}
                    </div>

                    <div class="flex gap-3 px-4 py-3 border-2 border-yellow-500 rounded-xl">
                        {{ form.title }}
                    </div>

                    <div class="flex gap-3 px-4 py-3 border-2 border-yellow-500 rounded-xl">
                        {{ form.content }}
                    </div>
                    
                    <div class="flex gap-3 px-4 py-3 border-2 border-yellow-500 rounded-xl">
                        {{ form.tags }}
                    </div>
                </div>
                    
                <div class="flex p-6 gap-3 w-full border-t-2 border-gray-200 items-center">
                    <button class="px-4 py-2 text-gray-50 bg-rose-800 font-medium rounded-md w-full">Tek Note</button>
                    <a href="/" class=" flex px-4 py-2 bg-gray-200 rounded-md w-full justify-center">
                        <p class="text-gray-700">Cancel</p>
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
